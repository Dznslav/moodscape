<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/littleicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Moodscape - personal mood journal with AI predictions">
  <title>Moodscape</title>
  <script>
    (function () {
      var storedTheme = localStorage.getItem('theme');
      var theme = storedTheme === 'light' || storedTheme === 'dark' ? storedTheme : 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.classList.toggle('dark', theme === 'dark');
      document.documentElement.style.colorScheme = theme;
    })();
  </script>
  <style>
    html {
      background: #0a0e27;
    }

    html[data-theme='light'] {
      background: #eef3fa;
    }

    body {
      margin: 0;
      background: inherit;
      color: #ffffff;
    }

    html[data-theme='light'] body {
      color: #0f172a;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@500;600;700;800&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
